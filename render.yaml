services:
  - type: web
    name: classflow-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: classflow-db
          property: connectionString

databases:
  - name: classflow-db
    databaseName: classflow
    user: classflow_user
